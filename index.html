<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>櫻坂46 四期生LIVE 天気・交通ボード</title>
    <meta
      name="description"
      content="LaLa arena TOKYO-BAYで開催される櫻坂46 四期生LIVE来場者向けの、台風・会場周辺天気・交通情報。"
    >
    <link rel="preload" as="image" href="assets/weather-bay.png">
    <link rel="preload" as="image" href="assets/day2-rain.png">
    <link rel="preload" as="image" href="assets/day3-wind.png">
    <link rel="preload" as="image" href="assets/transport-rain.png">
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
  </head>
  <body>
    <svg aria-hidden="true" class="icon-sprite">
      <symbol id="icon-cloud-rain" viewBox="0 0 24 24">
        <path d="M7.5 18.5 6 21M12 18.5 10.5 21M16.5 18.5 15 21"></path>
        <path d="M6.5 16h11a4 4 0 0 0 .4-8 6 6 0 0 0-11.2-1.8A5 5 0 0 0 6.5 16Z"></path>
      </symbol>
      <symbol id="icon-wind" viewBox="0 0 24 24">
        <path d="M3 8h11a3 3 0 1 0-3-3"></path>
        <path d="M3 12h16a3 3 0 1 1-3 3"></path>
        <path d="M3 16h8"></path>
      </symbol>
      <symbol id="icon-alert" viewBox="0 0 24 24">
        <path d="M12 3 2.8 19a2 2 0 0 0 1.7 3h15a2 2 0 0 0 1.7-3L12 3Z"></path>
        <path d="M12 9v5M12 18h.01"></path>
      </symbol>
      <symbol id="icon-train" viewBox="0 0 24 24">
        <path d="M6 3h12a3 3 0 0 1 3 3v8a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4V6a3 3 0 0 1 3-3Z"></path>
        <path d="M7 21l2-3M17 21l-2-3M7 8h10M8 14h.01M16 14h.01"></path>
      </symbol>
      <symbol id="icon-plane" viewBox="0 0 24 24">
        <path d="M2 16 22 3l-5 18-5-7-7-2-3 4Z"></path>
      </symbol>
      <symbol id="icon-home" viewBox="0 0 24 24">
        <path d="m3 11 9-8 9 8"></path>
        <path d="M5 10v10h14V10"></path>
        <path d="M10 20v-6h4v6"></path>
      </symbol>
      <symbol id="icon-link" viewBox="0 0 24 24">
        <path d="M10 13a5 5 0 0 0 7.1 0l2-2a5 5 0 0 0-7.1-7.1l-1 1"></path>
        <path d="M14 11a5 5 0 0 0-7.1 0l-2 2A5 5 0 0 0 12 20l1-1"></path>
      </symbol>
      <symbol id="icon-refresh" viewBox="0 0 24 24">
        <path d="M20 12a8 8 0 1 1-2.3-5.7"></path>
        <path d="M20 4v6h-6"></path>
      </symbol>
    </svg>

    <header class="top-shell">
      <div>
        <p class="eyebrow">LaLa arena TOKYO-BAY</p>
        <h1>四期生LIVE 天気・交通</h1>
      </div>
      <button class="refresh-button" id="refresh-button" type="button" aria-label="更新">
        <svg><use href="#icon-refresh"></use></svg>
      </button>
    </header>

    <section class="hero-deck" id="hero-deck" aria-label="スワイプで切り替える主要情報">
      <article class="hero-slide hero-slide--typhoon">
        <div class="slide-content">
          <p class="eyebrow">Typhoon</p>
          <h2 id="hero-typhoon-title">台風情報を確認中</h2>
          <p id="hero-typhoon-note">気象庁データを読み込み中です。</p>
          <div class="hero-metrics" id="hero-typhoon-metrics"></div>
          <figure class="satellite-card">
            <div class="satellite-grid">
              <img id="satellite-image" src="assets/weather-bay.png" alt="気象庁ひまわり日本域 赤外画像">
              <img id="satellite-water-image" src="assets/day3-wind.png" alt="気象庁ひまわり日本域 水蒸気画像">
            </div>
            <figcaption id="satellite-caption">衛星画像を読み込み中</figcaption>
          </figure>
        </div>
      </article>

      <article class="hero-slide hero-slide--day2">
        <div class="slide-content">
          <p class="eyebrow">June 2</p>
          <h2>6/2 初日</h2>
          <p id="hero-day2-lead">天気を読み込み中です。</p>
          <div class="hero-metrics" id="hero-day2-metrics"></div>
        </div>
      </article>

      <article class="hero-slide hero-slide--day3">
        <div class="slide-content">
          <p class="eyebrow">June 3</p>
          <h2>6/3 2日目</h2>
          <p id="hero-day3-lead">天気を読み込み中です。</p>
          <div class="hero-metrics" id="hero-day3-metrics"></div>
        </div>
      </article>

      <article class="hero-slide hero-slide--transport">
        <div class="slide-content">
          <p class="eyebrow">Transport</p>
          <h2 id="hero-transport-title">交通を確認中</h2>
          <p id="hero-transport-note">京葉線・京成本線・空港アクセスを確認しています。</p>
          <div class="hero-metrics" id="hero-transport-metrics"></div>
        </div>
      </article>
    </section>

    <nav class="hero-tabs" aria-label="ヒーロー切替">
      <button class="is-active" type="button" data-hero="0">台風</button>
      <button type="button" data-hero="1">6/2</button>
      <button type="button" data-hero="2">6/3</button>
      <button type="button" data-hero="3">交通</button>
    </nav>

    <main>
      <div class="update-row">
        <span id="refresh-state">更新待機中</span>
        <a href="https://lalaarenatokyo-bay.com/access/" target="_blank" rel="noreferrer">会場アクセス</a>
      </div>

      <section class="section">
        <div class="section-head">
          <h2>公演日の判断</h2>
          <p>雨具、風、交通を日別に確認。</p>
        </div>
        <div class="day-grid">
          <article class="day-card" id="day2-card"></article>
          <article class="day-card" id="day3-card"></article>
        </div>
      </section>

      <section class="section">
        <div class="section-head">
          <h2>交通一覧</h2>
          <p>会場アクセスと空港接続をまとめて確認。</p>
        </div>
        <div id="transport-list" class="transport-list"></div>
      </section>

      <section class="section">
        <div class="section-head">
          <h2>公式リンク</h2>
          <p>迷ったら公式情報を優先。</p>
        </div>
        <div id="official-links" class="link-grid"></div>
      </section>
    </main>
  </body>
</html>
